name: Deploy and Inject Secrets

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Inject Secrets into HTML
        run: |
          # Replace placeholders with actual secrets
          sed -i "s|{{ADMIN_PASSWORD}}|${{ secrets.ADMIN_PASSWORD }}|g" index.html
          sed -i "s|{{LIBRARIAN_PASSWORD}}|${{ secrets.LIBRARIAN_PASSWORD }}|g" index.html
          sed -i "s|{{STAFF_PASSWORD}}|${{ secrets.STAFF_PASSWORD }}|g" index.html
          
          # Add build timestamp
          echo "<!-- Built on: $(date) -->" >> index.html
          
          # Show that injection worked (for debugging)
          echo "Secrets injection completed at $(date)"
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
